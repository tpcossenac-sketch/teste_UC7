<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Cadastro</title>
    <link rel="icon" type="image/png" sizes="32x32" href="img/logo.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <div class="formulario_cadastro">

            <h2>Cadastro</h2>

            <label class="label_cadastro">Nome completo</label>
            <input type="text" placeholder="nome completo">

            <label class="label_cadastro">Data de Nascimento</label>
            <input type="date" placeholder="dd/mm/aaaa">

            <label class="label_cadastro">E-mail</label>
            <input type="email" placeholder="seu@email.com">

            <label class="label_cadastro">Telefone</label>
            <input type="tel" placeholder="(xx) xxxxx-xxxx">

            <label class="label_cadastro">Senha</label>
            <input type="password" placeholder="••••••••">

            <div class="opcoes_cadastro">
                <label>
                    <input type="checkbox">
                    Lembrar de mim
                </label>

                <a href="inicio.html" class="botao_cadastro">Finalizar Cadastro</a>

            </div>

        </div>

    </div>

</body>

</html>
